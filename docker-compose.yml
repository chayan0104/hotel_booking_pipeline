services:
  mysql-db:
    image: mysql:8.4
    container_name: hotel_mysql_db
    environment:
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE
      - MYSQL_USER
      - MYSQL_PASSWORD
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  rest-api:
    container_name: hotel_rest_api
    build:
      context: "./Rest Api"
    environment:
      - JAVA_OPTS
    ports:
      - "${API_PORT}:8080"
    depends_on:
      - mysql-db

  react-app:
    container_name: hotel_react_app
    build:
      context: "./React App"
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - rest-api

volumes:
  mysql_data:
