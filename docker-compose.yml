services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    environment:
      - ORACLE_PASSWORD
      - APP_USER
      - APP_USER_PASSWORD
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata

  rest-api:
    build:
      context: "./Rest Api"
    environment:
      - JAVA_OPTS
    ports:
      - "8080:8080"
    depends_on:
      - oracle-db

  react-app:
    build:
      context: "./React App"
    ports:
      - "3000:80"
    depends_on:
      - rest-api

volumes:
  oracle_data:
